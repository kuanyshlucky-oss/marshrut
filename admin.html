<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JetisHub — Админка</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#FBFBFA; --ink:#1D1D1F; --soft:#86868B; --line:#EAEAE7; --accent:#0A6CC9; --accent-ink:#0857A0; --accent-soft:rgba(10,108,201,.08); --surface:#fff; --ok:#2F6F5E; --ok-soft:#DCEAE3; --danger:#B14545; --danger-soft:#F4DADA; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Manrope',system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:900px; margin:0 auto; padding:32px 20px 60px; }
  h1{ font-size:24px; margin:0 0 4px; }
  .sub{ color:var(--soft); font-size:14px; margin:0 0 24px; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:20px; box-shadow:0 8px 24px -14px rgba(35,42,59,.2); }
  .card h2{ font-size:17px; margin:0 0 14px; }
  label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--soft); margin:0 0 6px; font-family:'Manrope',sans-serif; }
  input{ width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; margin-bottom:14px; }
  input:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; }
  .row > div{ flex:1 1 200px; }
  button{ font-family:inherit; cursor:pointer; border:1px solid transparent; border-radius:999px; padding:10px 20px; font-size:14px; font-weight:600; }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-primary:hover{ background:var(--accent-ink); }
  .btn-ghost{ background:transparent; border-color:var(--line); color:var(--ink); }
  .btn-ghost:hover{ border-color:var(--ink); }
  .btn-del{ background:var(--danger-soft); color:var(--danger); padding:5px 12px; font-size:12px; border-radius:8px; }
  .btn-del:hover{ background:var(--danger); color:#fff; }
  .btn-reset{ background:var(--accent-soft,#F4DCC8); color:var(--accent-ink); padding:5px 12px; font-size:12px; border-radius:8px; white-space:nowrap; }
  .btn-reset:hover{ background:var(--accent); color:#fff; }
  .pw-cell{ font-family:'Manrope',sans-serif; font-size:12px; }
  .pw-cell .v{ color:var(--ok); font-weight:600; }
  .cred{ background:#1B2030; color:#EDECE6; border-radius:12px; padding:16px 18px; margin-top:14px; font-family:'Manrope',sans-serif; }
  .cred .line{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:6px 0; }
  .cred .k{ color:#9AA0B4; font-size:12px; }
  .cred .v{ font-size:15px; }
  .cred button{ background:rgba(255,255,255,.1); color:#fff; padding:5px 12px; font-size:12px; border-radius:8px; }
  .cred .note{ color:#E0A060; font-size:12px; margin-top:8px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-family:'Manrope',sans-serif; text-transform:uppercase; font-size:10px; color:var(--soft); padding:8px 6px; border-bottom:1px solid var(--line); }
  td{ padding:9px 6px; border-bottom:1px solid var(--line); }
  .msg{ font-size:13px; margin-top:10px; }
  .msg.err{ color:var(--danger); }
  .msg.ok{ color:var(--ok); }
  .hidden{ display:none; }
  .keybar{ display:flex; gap:10px; align-items:flex-end; }
  .keybar > div{ flex:1; }
  .muted{ color:var(--soft); font-size:12px; }
  .access-cell{ min-width:170px; }
  .access-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
  .access-chip{
    display:inline-flex; align-items:center; gap:6px; background:var(--ok-soft); color:var(--ok);
    border-radius:999px; padding:3px 6px 3px 10px; font-family:'Manrope',sans-serif; font-size:11px;
  }
  .access-chip button{
    background:transparent; border:none; color:inherit; font-size:13px; line-height:1; padding:2px 4px;
    border-radius:50%; font-weight:700;
  }
  .access-chip button:hover{ background:rgba(0,0,0,.08); }
  .access-add{ display:flex; gap:6px; }
  .access-add select{ flex:1; padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:12px; font-family:inherit; margin:0; }
  .access-add button{ padding:5px 10px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>JetisHub — Админка</h1>
  <p class="sub">Создание аккаунтов и управление пользователями. Публичная регистрация отключена.</p>

  <!-- Ключ -->
  <div class="card">
    <h2>Доступ</h2>
    <div class="keybar">
      <div>
        <label for="key">ADMIN_KEY</label>
        <input id="key" type="password" placeholder="Ключ администратора" autocomplete="off">
      </div>
      <button class="btn-ghost" id="saveKey">Сохранить</button>
    </div>
    <p class="muted">Ключ хранится в этом браузере (localStorage).</p>
  </div>

  <!-- Создание -->
  <div class="card">
    <h2>Создать аккаунт</h2>
    <div class="row">
      <div>
        <label for="cName">Имя (необязательно)</label>
        <input id="cName" type="text" placeholder="Имя клиента">
      </div>
      <div>
        <label for="cEmail">Логин / email (необязательно)</label>
        <input id="cEmail" type="text" placeholder="оставьте пустым — сгенерируем">
      </div>
    </div>
    <button class="btn-primary" id="createBtn">Сгенерировать аккаунт</button>
    <div id="cred" class="cred hidden"></div>
    <p id="createMsg" class="msg"></p>
  </div>

  <!-- Список -->
  <div class="card">
    <h2>Пользователи (<span id="count">0</span>) <button class="btn-ghost" id="reloadBtn" style="float:right;padding:5px 14px;font-size:12px">Обновить</button></h2>
    <table>
      <thead><tr><th>ID</th><th>Логин (email)</th><th>Имя</th><th>Город</th><th>Тестов</th><th>Доступ к тестам</th><th>Создан</th><th>Пароль</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <p id="listMsg" class="msg"></p>
  </div>
</div>

<script>
const API_BASE = 'https://marshrut-9c5z.onrender.com';
const KEY = 'marshrut_admin_key';
const $ = id => document.getElementById(id);

function getKey(){ return localStorage.getItem(KEY) || ''; }
$('key').value = getKey();
$('saveKey').onclick = () => { localStorage.setItem(KEY, $('key').value.trim()); load(); };

async function api(path, opts={}){
  // ключ передаём заголовком, не query-строкой — так он не оседает в логах сервера/прокси
  const res = await fetch(API_BASE + path, {
    method: opts.method||'GET',
    headers:{'Content-Type':'application/json', 'X-Admin-Key': getKey()},
    body: opts.body?JSON.stringify(opts.body):undefined,
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok) throw new Error((data&&data.error)||('Ошибка '+res.status));
  return data;
}

function copy(text, btn){ navigator.clipboard.writeText(text).then(()=>{ const t=btn.textContent; btn.textContent='✓'; setTimeout(()=>btn.textContent=t,1200); }); }

$('createBtn').onclick = async () => {
  const msg = $('createMsg'); msg.textContent=''; msg.className='msg';
  const btn = $('createBtn'); btn.disabled=true; btn.textContent='Создаём…';
  try{
    const r = await api('/api/admin/create-user', { method:'POST', body:{ name:$('cName').value.trim(), email:$('cEmail').value.trim() } });
    const cred = $('cred'); cred.classList.remove('hidden');
    cred.innerHTML = `
      <div class="line"><span class="k">Логин</span><span class="v" id="cvL">${r.login}</span><button data-c="${r.login}">Копир.</button></div>
      <div class="line"><span class="k">Пароль</span><span class="v" id="cvP">${r.password}</span><button data-c="${r.password}">Копир.</button></div>
      <div class="line"><span class="k">Строка</span><span class="v">${r.login} / ${r.password}</span><button data-c="${r.login} / ${r.password}">Копир.</button></div>
      <p class="note">⚠ Пароль показан один раз — сохраните и передайте клиенту.</p>`;
    cred.querySelectorAll('button').forEach(b=>b.onclick=()=>copy(b.dataset.c,b));
    $('cName').value=''; $('cEmail').value='';
    load();
  }catch(e){ msg.textContent=e.message; msg.className='msg err'; }
  btn.disabled=false; btn.textContent='Сгенерировать аккаунт';
};

async function resetPw(id, login){
  if(!confirm('Сбросить пароль для '+login+'? Старый пароль перестанет работать.')) return;
  const cell = $('pw-'+id);
  try{
    const r = await api('/api/admin/reset-password', { method:'POST', body:{ id } });
    cell.innerHTML = `<span class="v">${r.password}</span> <button class="btn-reset" data-c="${r.password}">Копир.</button>`;
    const b = cell.querySelector('button');
    b.onclick = () => copy(r.password, b);
  }catch(e){ $('listMsg').textContent=e.message; $('listMsg').className='msg err'; }
}

async function del(id, login){
  if(!confirm('Удалить аккаунт '+login+'? Данные (результаты, избранное) тоже удалятся.')) return;
  try{ await api('/api/admin/delete-user', { method:'POST', body:{ id } }); load(); }
  catch(e){ $('listMsg').textContent=e.message; $('listMsg').className='msg err'; }
}

// Список тестов, у которых вообще есть контент — подгружается один раз,
// чтобы не хардкодить в админке, какие направления доступны для выдачи.
// Каждый элемент: {code, gopCode?, title} — gopCode/title для человекочитаемой подписи.
let testCodes = [];
async function loadTestCodes(){
  try{ testCodes = (await api('/api/admin/test-codes')).tests || []; }
  catch(e){ testCodes = []; }
}
function testLabel(code){
  const t = testCodes.find(x => x.code === code);
  if (!t) return code;
  const prefix = t.gopCode ? `${t.gopCode} · ${t.code}` : t.code;
  return t.title ? `${prefix} — ${t.title}` : prefix;
}

function accessCellHtml(u){
  const given = u.access || [];
  const chips = given.map(code => `
    <span class="access-chip" title="${testLabel(code)}">${code}<button data-revoke="${u.id}" data-code="${code}" title="Отозвать доступ">×</button></span>
  `).join('');
  const available = testCodes.filter(t => !given.includes(t.code));
  const select = available.length
    ? `<div class="access-add">
         <select data-add-select="${u.id}">${available.map(t=>`<option value="${t.code}">${testLabel(t.code)}</option>`).join('')}</select>
         <button class="btn-ghost" data-grant="${u.id}">Выдать</button>
       </div>`
    : (given.length ? '' : '<span class="muted">Нет доступных кодов</span>');
  return `<div class="access-chips">${chips}</div>${select}`;
}

async function grantAccess(userId, code){
  try{ await api('/api/admin/grant-access', { method:'POST', body:{ user_id:userId, code } }); load(); }
  catch(e){ $('listMsg').textContent=e.message; $('listMsg').className='msg err'; }
}

async function revokeAccess(userId, code){
  if(!confirm('Отозвать доступ к тесту '+code+'?')) return;
  try{ await api('/api/admin/revoke-access', { method:'POST', body:{ user_id:userId, code } }); load(); }
  catch(e){ $('listMsg').textContent=e.message; $('listMsg').className='msg err'; }
}

async function load(){
  const lm=$('listMsg'); lm.textContent=''; lm.className='msg';
  if(!getKey()){ lm.textContent='Введите ADMIN_KEY.'; lm.className='msg err'; return; }
  try{
    if(!testCodes.length) await loadTestCodes();
    const d = await api('/api/admin/users');
    $('count').textContent = d.count;
    $('rows').innerHTML = (d.users||[]).map(u=>`
      <tr>
        <td>${u.id}</td><td>${u.email}</td><td>${u.name||''}</td><td>${u.city||''}</td>
        <td>${u.results}</td>
        <td class="access-cell">${accessCellHtml(u)}</td>
        <td>${(u.created_at||'').slice(0,10)}</td>
        <td class="pw-cell" id="pw-${u.id}"><button class="btn-reset" data-reset="${u.id}" data-login="${u.email}">Сбросить пароль</button></td>
        <td><button class="btn-del" data-del="${u.id}" data-login="${u.email}">Удалить</button></td>
      </tr>`).join('');
    $('rows').querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>del(Number(b.dataset.del), b.dataset.login));
    $('rows').querySelectorAll('[data-reset]').forEach(b=>b.onclick=()=>resetPw(Number(b.dataset.reset), b.dataset.login));
    $('rows').querySelectorAll('[data-revoke]').forEach(b=>b.onclick=()=>revokeAccess(Number(b.dataset.revoke), b.dataset.code));
    $('rows').querySelectorAll('[data-grant]').forEach(b=>b.onclick=()=>{
      const sel = $('rows').querySelector(`[data-add-select="${b.dataset.grant}"]`);
      if(sel && sel.value) grantAccess(Number(b.dataset.grant), sel.value);
    });
  }catch(e){ lm.textContent=e.message; lm.className='msg err'; }
}

$('reloadBtn').onclick = load;
if(getKey()) load();
</script>
</body>
</html>

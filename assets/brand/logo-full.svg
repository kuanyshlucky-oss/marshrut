<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" fill="none" role="img" aria-label="JetisHub — Магистратураға жолыңыз">
  <defs>
    <linearGradient id="jhTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A6CC9"/>
      <stop offset="1" stop-color="#083F73"/>
    </linearGradient>
    <linearGradient id="jhHub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A6CC9"/>
      <stop offset="1" stop-color="#B08D46"/>
    </linearGradient>
  </defs>

  <!-- Иконка-плитка (чистый вектор, без растра) -->
  <g>
    <rect x="20" y="40" width="120" height="120" rx="26" fill="url(#jhTile)"/>
    <!-- белые лепестки -->
    <g fill="#FFFFFF">
      <ellipse cx="80"    cy="78.4"  rx="5.4"  ry="13.8"/>
      <ellipse cx="58.4"  cy="100"   rx="13.8" ry="5.4"/>
      <ellipse cx="101.6" cy="100"   rx="13.8" ry="5.4"/>
      <ellipse cx="80"    cy="121.6" rx="5.4"  ry="13.8"/>
      <circle  cx="80"    cy="100"   r="4.2"/>
    </g>
    <!-- золотые ромбы -->
    <g fill="#B08D46">
      <path d="M80 56.9 84.7 61.6 80 66.3 75.3 61.6Z"/>
      <path d="M41.6 95.3 46.3 100 41.6 104.7 36.9 100Z"/>
      <path d="M118.4 95.3 123.1 100 118.4 104.7 113.7 100Z"/>
      <path d="M80 133.7 84.7 138.4 80 143.1 75.3 138.4Z"/>
    </g>
  </g>

  <!-- Вордмарк (шрифт сайта Space Grotesk; Jetis = currentColor для тёмной/светлой темы) -->
  <text x="168" y="118" font-family="'Space Grotesk', 'Manrope', sans-serif" font-weight="700" font-size="76" letter-spacing="1">
    <tspan fill="currentColor">Jetis</tspan><tspan fill="url(#jhHub)">Hub</tspan>
  </text>
  <!-- Таглайн -->
  <text x="170" y="150" font-family="'Manrope', sans-serif" font-weight="600" font-size="15" letter-spacing="6.5"
        fill="currentColor" opacity="0.55">МАГИСТРАТУРАҒА ЖОЛЫҢЫЗ</text>
</svg>

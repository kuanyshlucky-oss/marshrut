# Render Blueprint для API «Маршрут».
# Можно задеплоить вручную через дашборд Render (New → Web Service) —
# этот файл нужен только если деплоите как Blueprint (New → Blueprint).
services:
  - type: web
    name: marshrut-api
    runtime: docker
    rootDir: server
    # Данные хранятся во внешней Postgres (Neon) — постоянно, не зависит от редеплоя.
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true            # Render сгенерирует случайный секрет
      - key: ALLOWED_ORIGIN
        value: https://kuanyshlucky-oss.github.io
      - key: DATABASE_URL
        sync: false                    # строка подключения Neon — задать вручную в дашборде
      - key: ADMIN_KEY
        sync: false                    # ключ для /api/admin/users — задать вручную

  .hint{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin:0 0 10px; }

  .list{

    overflow:hidden; max-height:420px; overflow-y:auto; background:var(--surface);
  }
  .list-empty{ padding:20px; color:var(--ink-soft); font-size:14px; text-align:center; }
  .row{
    display:flex; align-items:center; gap:14px; padding:13px 16px; cursor:pointer;
    border-bottom:1px solid var(--line); transition:background .15s;
  }
  .row:last-child{ border-bottom:none; }
  .row:hover, .row.is-active{ background:rgba(0,219,233,.08); }
  .row-code{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); flex:0 0 52px; }
  .row-name{ font-size:14px; flex:1; }
  .row-pct{ font-family:var(--mono); font-size:13px; flex:0 0 auto; }

  .card{
    margin-top:26px; background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:26px 28px;
  }
  .card-code{ font-family:var(--mono); color:var(--accent); font-size:13px; letter-spacing:.04em; }
  .card-name{ font-family:'Libre Caslon Text',serif; font-size:24px; margin:6px 0 22px; }

  .stat-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:22px; }
  .stat{ background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:14px 16px; }
  .stat-label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:8px; }
  .stat-value{ font-size:22px; font-weight:600; }
  .stat-value small{ font-size:13px; color:var(--ink-soft); font-weight:400; }

  .bar-row{ margin-bottom:14px; }
  .bar-row-top{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .bar-row-top b{ font-family:var(--mono); }
  .bar-track{ height:10px; border-radius:6px; background:var(--bg); overflow:hidden; display:flex; }
  .bar-fill-pass{ background:var(--good); height:100%; }
  .bar-fill-fail{ background:var(--bad); height:100%; }

  .no-data{ text-align:center; padding:32px; color:var(--ink-soft); }
  @media (max-width:560px){
    .row-name{ font-size:13px; }
    .card{ padding:20px; }
  }
</style>

const listEl = document.getElementById('list');
const cardEl = document.getElementById('card');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
let selectedCode = null;

function norm(s){ return s.toLowerCase().replace(/ё/g,'е'); }

function renderList(query){
  const q = norm(query.trim());
  const items = q
    ? KT_STATS_2025.filter(g => norm(g.name).includes(q) || norm(g.code).includes(q))
    : KT_STATS_2025;
  countEl.textContent = items.length;
  if (!items.length){
    listEl.innerHTML = '<div class="list-empty">Ничего не найдено</div>';
    return;
  }
  listEl.innerHTML = items.map(g => `
    <div class="row ${g.code === selectedCode ? 'is-active' : ''}" data-code="${g.code}">
      <span class="row-code">${g.code}</span>
      <span class="row-name">${g.name}</span>
      <span class="row-pct" style="color:${g.passed_pct >= 50 ? 'var(--good)' : 'var(--bad)'}">${g.passed_pct.toFixed(1)}%</span>
    </div>
  `).join('');
  listEl.querySelectorAll('.row').forEach(r => r.addEventListener('click', () => selectGroup(r.dataset.code)));
}

function selectGroup(code){
  selectedCode = code;
  const g = KT_STATS_2025.find(x => x.code === code);
  if (!g) return;
  renderList(searchEl.value);
  cardEl.innerHTML = `
    <div class="card">
      <div class="card-code">${g.code}</div>
      <div class="card-name">${g.name}</div>

      <div class="stat-grid">
        <div class="stat">
          <div class="stat-label">Заявлений</div>
          <div class="stat-value">${g.applications.toLocaleString('ru-RU')}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Участников КТ</div>
          <div class="stat-value">${g.participants.toLocaleString('ru-RU')} <small>${g.participation_pct.toFixed(1)}%</small></div>
        </div>
        <div class="stat">
          <div class="stat-label">Набрали порог</div>
          <div class="stat-value" style="color:var(--good)">${g.passed.toLocaleString('ru-RU')} <small>${g.passed_pct.toFixed(1)}%</small></div>
        </div>
        <div class="stat">
          <div class="stat-label">Не набрали порог</div>
          <div class="stat-value" style="color:var(--bad)">${g.failed.toLocaleString('ru-RU')} <small>${g.failed_pct.toFixed(1)}%</small></div>
        </div>
      </div>

      <div class="bar-row">
        <div class="bar-row-top"><span>Набрали / не набрали порог</span><b>${g.passed_pct.toFixed(1)}% / ${g.failed_pct.toFixed(1)}%</b></div>
        <div class="bar-track">
          <div class="bar-fill-pass" style="width:${g.passed_pct}%"></div>
          <div class="bar-fill-fail" style="width:${g.failed_pct}%"></div>
        </div>
      </div>
    </div>
  `;
  cardEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

searchEl.addEventListener('input', () => renderList(searchEl.value));
renderList('');
</script>
</body>
</html>

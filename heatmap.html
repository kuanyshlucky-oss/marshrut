<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Маршрут — Тепловая карта вузов</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --bg:#131313; --surface:#1c1b1b; --ink:#e5e2e1; --ink-soft:#a9adae;
    --line:rgba(255,255,255,.10); --accent:#00dbe9; --beige:#d2c4ba;
    --mono:'JetBrains Mono',monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'Geist',system-ui,sans-serif; }
  header{
    position:sticky; top:0; z-index:1100;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:0 28px; height:64px;
    background:rgba(19,19,19,.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
  }
  .logo{ font-family:'Libre Caslon Text',serif; font-size:20px; color:var(--ink); text-decoration:none; }
  .logo span{ color:var(--accent); }
  .controls{ display:flex; align-items:center; gap:12px; }
  label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); }
  select{
    background:var(--surface); color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:9px 12px; font-size:14px; font-family:inherit;
  }
  select:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .back{ color:var(--ink-soft); font-size:14px; text-decoration:none; }
  .back:hover{ color:var(--accent); }
  #map{ height:calc(100vh - 64px - 46px); }
  .legend{
    display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap;
    height:46px; font-size:12px; color:var(--ink-soft);
    background:var(--surface); border-top:1px solid var(--line); font-family:var(--mono);
  }
  .dot{ display:inline-block; width:11px; height:11px; border-radius:50%; margin-right:6px; vertical-align:-1px; }
  /* тёмные тайлы: приглушаем стандартную OSM-подложку */
  .leaflet-tile{ filter:brightness(.65) contrast(1.1) saturate(.55); }
  .leaflet-popup-content-wrapper{ background:var(--surface); color:var(--ink); border-radius:10px; border:1px solid var(--line); }
  .leaflet-popup-tip{ background:var(--surface); }
  .pp-name{ font-weight:600; margin:0 0 6px; font-size:14px; }
  .pp-row{ display:flex; justify-content:space-between; gap:16px; font-size:13px; color:var(--ink-soft); padding:2px 0; }
  .pp-row b{ color:var(--ink); font-weight:500; font-family:var(--mono); }
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html"><span>⟁</span> Маршрут</a>
  <div class="controls">
    <label for="spec">Специальность</label>
    <select id="spec"></select>
  </div>
  <a class="back" href="kt-stats.html">Экзамен</a>
  <a class="back" href="index.html">← На главную</a>
</header>

<div id="map"></div>

<div class="legend">
  <span><span class="dot" style="background:#4caf7d"></span>конкурс &lt; 5</span>
  <span><span class="dot" style="background:#e6c34a"></span>5–7</span>
  <span><span class="dot" style="background:#e6893a"></span>7–10</span>
  <span><span class="dot" style="background:#e05252"></span>&gt; 10</span>
  <span><span class="dot" style="background:#8e9192"></span>нет данных</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_BASE = 'https://marshrut-9c5z.onrender.com';

const map = L.map('map').setView([48.0, 68.0], 5); // Казахстан целиком
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18,
}).addTo(map);

let markers = [];

function colorFor(ratio) {
  if (!ratio || ratio <= 0) return '#8e9192';
  if (ratio < 5)  return '#4caf7d';
  if (ratio <= 7) return '#e6c34a';
  if (ratio <= 10) return '#e6893a';
  return '#e05252';
}

async function loadSpecs() {
  const res = await fetch(API_BASE + '/api/specialities');
  const specs = await res.json();
  const sel = document.getElementById('spec');
  sel.innerHTML = specs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  sel.addEventListener('change', () => loadHeatmap(sel.value));
  if (specs.length) loadHeatmap(specs[0].id);
}

async function loadHeatmap(specId) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const res = await fetch(`${API_BASE}/api/heatmap?speciality_id=${specId}`);
  const data = await res.json();
  data.forEach(h => {
    const c = colorFor(h.competition_ratio);
    const m = L.circleMarker([h.lat, h.lng], {
      radius: 14, color: c, weight: 2, fillColor: c, fillOpacity: 0.55,
    }).addTo(map);
    m.bindPopup(`
      <p class="pp-name">${h.name}</p>
      <div class="pp-row"><span>Город</span><b>${h.city}</b></div>
      <div class="pp-row"><span>Средний проходной</span><b>${h.avg_score}</b></div>
      <div class="pp-row"><span>Грантов</span><b>${h.grant_count}</b></div>
      <div class="pp-row"><span>Конкурс (заявл./грант)</span><b>${h.competition_ratio ? h.competition_ratio.toFixed(1) : '—'}</b></div>
    `);
    markers.push(m);
  });
}

loadSpecs().catch(() => {
  document.querySelector('.legend').textContent = 'Сервер просыпается (до 50 сек) — обновите страницу.';
});
</script>
</body>
</html>
